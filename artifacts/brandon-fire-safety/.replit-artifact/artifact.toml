kind = "web"
previewPath = "/"
title = "Brandon Fire & Safety"
version = "1.0.0"
id = "artifacts/brandon-fire-safety"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21426

[services.development]
run = "pnpm --filter @workspace/brandon-fire-safety run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brandon-fire-safety", "run", "build" ]
publicDir = "artifacts/brandon-fire-safety/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21426"
BASE_PATH = "/"
